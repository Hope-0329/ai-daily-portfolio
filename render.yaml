# Render Blueprint — Docker 部署
services:
  - type: web
    name: ai-daily-mcp
    runtime: docker
    region: singapore
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: LLM_BASE_URL
        value: https://api.deepseek.com/v1
      - key: LLM_MODEL
        value: deepseek-chat
      - key: LLM_API_KEY
        sync: false
      - key: LLM_TIMEOUT
        value: "60"
